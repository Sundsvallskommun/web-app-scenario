name: Cypress Tests Admin
permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "develop"
      - "main"
    paths:
      - .github/workflows/cypress-admin.yml
      - admin/package.json
      - admin/yarn.lock
      - admin/src/**
      - admin/cypress/**

jobs:
  install:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NEXT_PUBLIC_APP_NAME: Scenariobyggare
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_API_PATH: /api
      DOMAIN_NAME: localhost
      BASE_PATH: ""
      NEXT_PUBLIC_BASE_PATH: ""
      HEALTH_AUTH: false
      HEALTH_USERNAME: ""
      HEALTH_PASSWORD: ""
      PORT: 3002
    defaults:
      run:
        working-directory: admin
    name: E2E in Chrome on ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: admin/yarn.lock

      - name: Install dependencies
        run: yarn --frozen-lockfile --silent --network-timeout 1000000

      - name: Build application
        run: yarn build

      - name: Run Cypress
        run: |
          yarn start > /tmp/admin-next.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          for i in {1..60}; do
            if curl --silent --output /dev/null http://localhost:3002; then
              break
            fi
            sleep 5
          done

          if ! curl --silent --output /dev/null http://localhost:3002; then
            cat /tmp/admin-next.log
            exit 1
          fi

          ./node_modules/.bin/cypress run --browser chrome --headless --spec "cypress/e2e/**/*.cy.ts"
